<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KasGatech | Demande de devis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.hero{
background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
            url("https://images.unsplash.com/photo-1554224155-6726b3ff858f");
background-size:cover;
background-position:center;
color:white;
text-align:center;
padding:100px 0;
}

.form-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark py-3">
<div class="container">
<a class="navbar-brand fw-bold" href="index.html">KasGatech</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="container">
<h1>Demande de devis</h1>
<p>Parlez-nous de votre projet et recevez une estimation</p>
</div>
</section>

<!-- FORM -->
<section class="py-5 bg-light">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-8">

<div class="form-box">

<form>

<!-- NOM -->
<input type="text" class="form-control mb-3" placeholder="Nom complet">

<!-- EMAIL -->
<input type="email" class="form-control mb-3" placeholder="Email">

<!-- TELEPHONE -->
<input type="text" class="form-control mb-3" placeholder="Téléphone">

<!-- TYPE PROJET -->
<select class="form-control mb-3">
<option>Type de projet</option>
<option>Site vitrine</option>
<option>E-commerce</option>
<option>Application web</option>
<option>Dashboard data</option>
<option>IA / Machine Learning</option>
</select>

<!-- BUDGET -->
<select class="form-control mb-3">
<option>Budget estimatif</option>
<option>- 100 000 FCFA</option>
<option>100 000 – 300 000 FCFA</option>
<option>300 000 – 600 000 FCFA</option>
<option>600 000+ FCFA</option>
</select>

<!-- DELAI -->
<select class="form-control mb-3">
<option>Délai souhaité</option>
<option>Urgent</option>
<option>1 mois</option>
<option>2–3 mois</option>
<option>Flexible</option>
</select>

<!-- MESSAGE -->
<textarea class="form-control mb-3" rows="5" placeholder="Décrivez votre projet"></textarea>

<button class="btn btn-primary w-100">Envoyer la demande</button>

</form>

</div>
</div>
</div>
</div>
</section>

<footer class="bg-dark text-light text-center py-3">
© 2026 KasGatech
</footer>

</body>
</html>
